services:
  postgres:
    image: 'postgres:17-alpine'
    container_name: postgres-db
    environment:
      - 'POSTGRES_DB=management_system'
      - 'POSTGRES_PASSWORD=12345678'
      - 'POSTGRES_USER=developer'
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U developer -d management_system"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: ms-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_URL=jdbc:postgresql://postgres:5432/management_system
      - DB_USER=developer
      - DB_PASSWORD=12345678
      - ALLOWED_ORIGINS=http://localhost:4200
    depends_on:
      postgres:
        condition: service_healthy