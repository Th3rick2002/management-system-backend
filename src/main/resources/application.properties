spring.application.name=management-system-backend

# PERFIL ACTIVO:
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Configuración del Servidor
server.port=${PORT:8080}
server.servlet.context-path=/api/v1

# CORS
management-system.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:4200}

# Documentación (Swagger/OpenAPI)
springdoc.api-docs.enabled=${ENABLE_SWAGGER:false}
springdoc.swagger-ui.enabled=${ENABLE_SWAGGER:false}